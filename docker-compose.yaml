services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-app
    restart: unless-stopped
    ports:
      - "4007:5000"
    environment:
      - VIRTUAL_HOST=social.buyfishingrod.com
      - VIRTUAL_PORT=5000
      - LETSENCRYPT_HOST=social.buyfishingrod.com
      - LETSENCRYPT_EMAIL=peter@creatorain.com
    env_file:
      - .env
    volumes:
      - postiz-uploads:/uploads
      - postiz-config:/config
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    networks:
      - postiz-network
      - temporal-network
      - nginx-network

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: postiz_password
      POSTGRES_DB: social_scheduler
    volumes:
      - postiz-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz -d social_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postiz-network

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postiz-network

  # Temporal requires Elasticsearch for unlimited search attributes
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-elasticsearch
    restart: unless-stopped
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    expose:
      - 9200
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - temporal-network

  temporal-db:
    image: postgres:16-alpine
    container_name: postiz-temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal_password
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - temporal-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: postiz-temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal_password
      - POSTGRES_SEEDS=postiz-temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/production-docker.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
    depends_on:
      temporal-db:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - temporal-network

volumes:
  postiz-uploads:
  postiz-config:
  postiz-pg-data:
  temporal-pg-data:
  es-data:

networks:
  postiz-network:
    driver: bridge
  temporal-network:
    driver: bridge
    name: temporal-network
  nginx-network:
    external: true
